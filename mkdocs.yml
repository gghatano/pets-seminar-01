site_name: 仮名加工情報・匿名加工情報 事例再現デモ
site_description: 個人情報保護委員会事務局の事例レポートに基づく、データ加工設計の思考プロセスを追体験する教材
site_url: https://gghatano.github.io/pets-seminar-01/
repo_url: https://github.com/gghatano/pets-seminar-01
repo_name: gghatano/pets-seminar-01
docs_dir: docs
copyright: 教材デモ（合成データ使用）。実際の個人データに対する法令適合性を保証するものではありません。

extra_css:
  - stylesheets/extra.css
  - stylesheets/print.css

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え

plugins:
  - search:
      lang:
        - ja
        - en
  # mkdocs-jupyter: docs_dir 配下に置いた .ipynb を実行結果つきで HTML 化する。
  # 加工実装 Notebook の「実行済み結果」を層③に埋め込む際に nav へ追加する。
  - mkdocs-jupyter:
      include_source: true
      execute: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# 3層構成（HTML=検討/結果、Colab=実装）
nav:
  - はじめに: index.md
  - 1枚チートシート: cheatsheet.md
  - "case01 仮名加工情報":
      - "① 検討":
          - 事例概要: case01_pseudonymized/01_case_summary.md
          - データを見る（テーブル定義）: case01_pseudonymized/03_table_definition_before.md
          - 情報特性の評価: case01_pseudonymized/04_column_classification.md
          - 加工の設計: case01_pseudonymized/05_processing_design.md
          - 加工仕様: case01_pseudonymized/06_processing_spec.md
      - "② 実装（Colab）": case01_pseudonymized/notebook.md
      - "③ 結果":
          - 加工後テーブル定義: case01_pseudonymized/07_table_definition_after.md
          - 加工結果とチェック: case01_pseudonymized/09_results.md
  - "case02 匿名加工情報":
      - "① 検討":
          - 事例概要: case02_anonymized/01_case_summary.md
          - データを見る（テーブル定義）: case02_anonymized/03_table_definition_before.md
          - 情報特性の評価: case02_anonymized/04_column_classification.md
          - 加工の設計: case02_anonymized/05_processing_design.md
          - 加工仕様: case02_anonymized/06_processing_spec.md
      - "② 実装（Colab）": case02_anonymized/notebook.md
      - "③ 結果":
          - 加工後テーブル定義: case02_anonymized/07_table_definition_after.md
          - 加工結果とチェック: case02_anonymized/09_results.md
  - 参考:
      - 用語集: glossary.md
      - "デモデータについて（case01）": case01_pseudonymized/02_dummy_data_spec.md
      - "デモデータについて（case02）": case02_anonymized/02_dummy_data_spec.md
      - 参照資料: references/README.md
      - "Notebook仕様書（case01）": case01_pseudonymized/08_notebook_spec.md
      - "Notebook仕様書（case02）": case02_anonymized/08_notebook_spec.md
      - 設計・実装指示書(spec): spec.md
